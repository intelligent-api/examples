    TokenRequest:
      type: object
      properties:
        client_id:
          description: The client_id generated from the dashboard.
          type: string
          example: 1a6bff6f9cf34975813590831c
        client_secret:
          description: The client_secret generated from the dashboard.
          type: string
          example: 1a6bff6f9cf34975813590831c1a6bff6f9cf34975813590831c
        grant_type:
          description: The grant type which will always be client_credentials.
          type: string
          default: client_credentials
        scope:
          description: The list of scopes the token should be generated for separated by a space.
          type: string
          example: client.balance document.expense document.text document.identity language.detect language.translate pii.detect pii.redact scraper.markdown text.sentiment text.summarize speech.transcribe image.list image.calories text.calories text.classify text.expenses text.todos
      required:
        - client_id
        - client_secret
        - grant_type
        - scope

    TokenResponse:
      type: object
      properties:
        access_token:
          description: The access_token to be used as the Bearer token when making subsequent API requests.
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
        token_type:
          description: The type of token that was generated.
          type: string
          default: bearer
        expires_in:
          description: The amount of time in seconds in which the token expires.
          type: integer
          format: int64
          default: 14400
        scope:
          description: The list of scopes the token is valid for separated by a space.
          type: string
          example: client.balance document.expense document.text document.identity language.detect language.translate pii.detect pii.redact scraper.markdown text.sentiment text.summarize speech.transcribe image.list image.calories text.calories text.classify text.expenses text.todos
      required:
        - access_token
        - token_type
        - expires_in
        - scope

  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      schema:
        type: string
      required: true
      description: Either <ins>[Oauth Authentication](/docs/oauth-authentication)</ins> using a `Bearer` token or <ins>[Basic Authentication](/docs/basic-authentication)</ins> using a `Basic` api key.

    CorrelationHeader:
      name: X-Correlation-Id
      in: header
      schema:
        type: string
        format: uuid
        example: dfe8e127-14aa-42e5-8397-118ebd4594b3
      required: false
      description: If you would like to correlate any API requests made with any errors that may be returned, pass in this header and the system will log the id with all requests internally.

    UserAgentHeader:
      name: User-Agent
      in: header
      schema:
        type: string
        example: Intelligent API cURL Integration
      required: false
      description: You can pass in the User Agent for any custom integration you build to identify the caller, for example if you are integrating your own different APIs you can set the user agent to identify which calls originate from which API.
