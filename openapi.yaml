openapi: 3.0.2
info:
  title: Intelligent API
  description: |-
    The Intelligent API provides a unique set of endpoints that a caller can use to perform the following functions:

    - Optical Character Recognition on images and documents, including specific functionality to cater for reading identity documentation and expense (receipts / invoices) information.
    - Language functions such as detecting the language of a body of text or translating between 75 different languages
    - The ability to identify and redact Personally Identifiable Information from bodies of text
    - The ability to detect the overall sentiment and summarize bodies of text


    Some useful links:
    - <a href="https://github.com/intelligent-api/bruno" target="_blank">Bruno Collection</a>
    - <a href="https://github.com/intelligent-api/postman" target="_blank">Postman Collection</a>
    - <a href="https://github.com/intelligent-api/examples/" target="_blank">Code Examples</a>
  termsOfService: https://intelligent-api.com/terms
  contact:
    email: support@intelligent-api.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Intelligent API that offers the consumer API endpoints to perform optical character recognition, language detection and translation, personal identifiable information (PII) detection and redaction as well as text sentiment detection and text summarization.
  url: https://intelligent-api.com
servers:
  - url: https://api.intelligent-api.com/v1
tags:
  - name: Authentication
    description: Authentication for the API
    externalDocs:
      description: Find out more
      url: /docs/oauth-authentication
  - name: Document-OCR
    description: Document Optical Character Recognition (OCR)
    externalDocs:
      description: Find out more
      url: /docs/playground#document-optical-character-recognition-ocr
  - name: Language
    description: Language
    externalDocs:
      description: Find out more
      url: /docs/playground#language
  - name: Media
    description: Media
    externalDocs:
      description: Find out more
      url: /docs/playground#media
  - name: PII
    description: Personally Identifiable Information (PII)
    externalDocs:
      description: Find out more
      url: /docs/playground#personally-identifiable-information-pii
  - name: Text
    description: Text
    externalDocs:
      description: Find out more
      url: /docs/playground#text
  - name: Web-Scraper
    description: Web Scraper
    externalDocs:
      description: Find out more
      url: /docs/playground#scraper
  - name: System
    description: System functions

