components:
  schemas:
    SummarizeTextResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        summaryPoints:
          description: The list of summary points.
          type: array
          items:
            type: string
          example: ["There was a quick fox.", "It jumped over the brown dog."]
      required:
        - costCalculation
        - summaryPoints

    TextSentimentResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        sentiment:
          type: string
          description: The overall sentiment of the text.
          enum:
            - POSITIVE
            - NEGAITVE
            - MIXED
            - NEUTRAL
        sentimentScore:
          $ref: "#/components/schemas/SentimentScore"
      required:
        - costCalculation
        - sentiment
        - sentimentScore

    SentimentScore:
      type: object
      properties:
        mixed:
          type: number
          format: float
          description: The mixed sentiment score.
          example: 0.01
        negative:
          type: number
          format: float
          description: The negative sentiment score.
          example: 0.02
        neutral:
          type: number
          format: float
          description: The neutral sentiment score.
          example: 0.07
        positive:
          type: number
          format: float
          description: The positive sentiment score.
          example: 0.90
      required:
        - mixed
        - negative
        - neutral
        - positive

    RedactPiiResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        text:
          type: string
          description: The text with the PII entities redacted.
          example: "Hello, my name is [NAME] and I am a software developer."
      required:
        - costCalculation
        - text

    RedactPiiRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text.
          example: "Hello, my name is Johnathan Doe and I am a software developer."
        language:
          type: string
          description: The source language code.
          example: "en"
        minimumScore:
          type: number
          format: float
          description: The minimum score for which to redact the PII entities.
          example: 0.75
      required:
        - text
        - language

    TextClassificationRequest:
      type: object
      properties:
        text:
          type: string
          description: The text to classify.
          example: "Eggs"
        classifications:
          type: array
          example: ["Food", "Drink", "Other"]
          items:
            type: string
      required:
        - text
        - classifications

    TextClassificationMultipleRequest:
      type: object
      properties:
        items:
          type: array
          description: The list of text items to classify.
          example: ["Eggs", "Milk", "Bread"]
          items:
            type: string
        classifications:
          type: array
          example: ["Food", "Drink", "Other"]
          items:
            type: string
      required:
        - items
        - classifications

    DetectPiiResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/DetectPiiEntity"
          description: The PII entities detected in the text.
      required:
        - costCalculation
        - entities

    DetectPiiEntity:
      type: object
      properties:
        beginOffset:
          type: integer
          description: The starting offset of the detected entity.
          format: int64
          example: 100
        endOffset:
          type: integer
          description: The ending offset of the detected entity.
          format: int64
          example: 110
        score:
          type: number
          format: float
          description: The percentage of the text that is this language.
          example: 0.99
        type:
          type: string
          description: The type of entity detected.
          example: "NAME"
        text:
          type: string
          description: The text of entity detected.
          example: "Johnathan Doe"
      required:
        - beginOffset
        - endOffset
        - score
        - type
        - text

    TextLanguageRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text.
          example: "Hello, my name is Johnathan Doe and I am a software developer."
        language:
          type: string
          description: The source language code.
          example: "en"
      required:
        - text
        - language

    TranslateResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        text:
          type: string
          description: The translated text.
          example: "Le rapide renard brun saute par-dessus le chien paresseux."
        sourceLanguage:
          type: string
          description: The source language code.
          example: "en"
        targetLanguage:
          type: string
          description: The target language code.
          example: "fr"
      required:
        - costCalculation
        - text
        - sourceLanguage
        - targetLanguage

    TranslateRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text.
          example: "The quick brown fox jumps over the lazy dog."
        sourceLanguage:
          type: string
          description: The source language code, use `auto` if the source is unknown.
          example: "auto"
        targetLanguage:
          type: string
          description: The target language code.
          example: "fr"
      required:
        - text
        - sourceLanguage
        - targetLanguage

    LanguageDetectResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        languages:
          description: The list of languages detected in the body of text.
          type: array
          items:
            $ref: "#/components/schemas/LanguageDetectItem"
      required:
        - costCalculation
        - languages

    LanguageDetectItem:
      type: object
      properties:
        languageCode:
          type: string
          description: The language code.
          example: en
        language:
          type: string
          description: The language name.
          example: English
        score:
          type: number
          format: float
          description: The percentage of the text that is this language.
          example: 0.99
      required:
        - languageCode
        - language
        - score

    TextRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text.
          example: "The quick brown fox jumps over the lazy dog."
      required:
        - text

    CalorieTextRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text.
          example: "Bacon and eggs and a cup of coffee."
      required:
        - text

    SpeechTranscribeResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/DocumentCostCalculation"
        speech:
          type: string
          description: The transcribed text from the audio file.
          example: "Welcome to Intelligent API, your go-to solution for AI-powered endpoints."
      required:
        - costCalculation
        - speech

    SpeechExpensesResponse:
      type: object
      properties:
        costCalculations:
          description: A list of the cost calculations involved in completing the request.
          type: array
          items:
            $ref: "#/components/schemas/TextCostCalculation"
        items:
          type: array
          description: The list of expense items extracted from the audio.
          items:
            $ref: "#/components/schemas/TextExpenseItem"
        speech:
          type: string
          description: The transcribed text from the audio file.
          example: "59.99 for Bananas."
      required:
        - costCalculations
        - items
        - speech

    SpeechCaloriesResponse:
      type: object
      properties:
        costCalculations:
          description: A list of the cost calculations involved in completing the request.
          type: array
          items:
            $ref: "#/components/schemas/TextCostCalculation"
        calorieCounterResult:
          $ref: "#/components/schemas/CalorieCounterResult"
        speech:
          type: string
          description: The transcribed text from the audio file.
          example: "Pineapple chunks"
      required:
        - costCalculations
        - calorieCounterResult
        - speech

    SpeechTodoResponse:
      type: object
      properties:
        costCalculations:
          description: A list of the cost calculations involved in completing the request.
          type: array
          items:
            $ref: "#/components/schemas/TextCostCalculation"
        todo:
          $ref: "#/components/schemas/TextTodoItem"
        speech:
          type: string
          description: The transcribed text from the audio file.
          example: "Pick up the car tomorrow evening."
      required:
        - costCalculations
        - todo
        - speech

    SpeechTranscribeRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: The audio file to transcribe. Supported formats include OGG, MP3, WAV, FLAC, and M4A.
      required:
        - file

    ScraperRequest:
      type: object
      properties:
        url:
          type: string
          description: The url of the webpage.
          example: "https://fullcycle.tech"
        proxy:
          type: string
          description: If required, the complete uri of the server to proxy the request through.
          example: "http://brd-customer-xxx-zone-xxx:xxx@brd.superproxy.io:xxx"
      required:
        - url

    ScraperMarkdownResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        markdown:
          description: The markdown of the web page.
          type: string
          example: "Title: Home | Full Cycle Tech\n\nURL Source: https://fullcycle.tech/\n\nMarkdown Content: # This is a heading\n\nThis is text"
      required:
        - costCalculation
        - summaryPoints

    ScraperSummarizeResponse:
      type: object
      properties:
        costCalculations:
          description: A list of the cost calculations involved in completing the request.
          type: array
          items:
            $ref: "#/components/schemas/DocumentCostCalculation"
        summaryPoints:
          type: array
          description: A list of summary points extracted from the web page.
          items:
            type: string
            example:
              [
                "John doe is wrote this article.",
                "The article discusses the topic of climate change.",
              ]
      required:
        - costCalculations
        - summaryPoints

    SupportedLanguageResponse:
      type: object
      properties:
        code:
          type: string
          description: The language code.
          example: en
        language:
          type: string
          description: The language name.
          example: English
      required:
        - code
        - language

    ExtractTextSummarizeResponse:
      type: object
      properties:
        costCalculations:
          description: A list of the cost calculations involved in completing the request.
          type: array
          items:
            $ref: "#/components/schemas/DocumentCostCalculation"
        summaryPoints:
          type: array
          description: A list of summary points extracted from the text.
          items:
            type: string
            example:
              [
                "John doe is wrote this document.",
                "The document discusses the topic of climate change.",
              ]
      required:
        - costCalculations
        - summaryPoints

    ExtractIdentityResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/DocumentCostCalculation"
        identityEntities:
          type: array
          description: The list of fields extracted
          items:
            $ref: "#/components/schemas/IdentityEntity"
      required:
        - costCalculation
        - identityEntities

    IdentityEntity:
      type: object
      properties:
        fieldName:
          type: string
          description: "Name of the identity field."
          enum:
            - FIRST_NAME
            - LAST_NAME
        fieldValue:
          type: string
          description: "Value of the identity field."
          example: "JOHN"
        normalizedValue:
          type: object
          properties:
            value:
              type: string
              description: "Normalized value of the field."
            valueType:
              type: string
              description: "Type of the normalized value."
      required:
        - fieldName
        - fieldValue

    ExtractTextResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/DocumentCostCalculation"
        detectedText:
          type: string
          description: All of the detected text.
          example: "This was the first line in the document.\nThis was the second line."
        detectedLines:
          type: array
          description: An array of each line of detected text.
          items:
            type: string
            example:
              [
                "This was the first line in the document.",
                "This was the second line.",
              ]
      required:
        - costCalculation
        - detectedText
        - detectedLines

    DocumentCostCalculation:
      description: The cost calculation for the endpoint invocation
      type: object
      properties:
        operation:
          type: string
          description: The name of the scope that was used for this cost calculation.
          enum:
            - document.expense
            - document.text
            - document.identity
            - image.calories
            - image.list
            - language.detect
            - language.translate
            - pii.detect
            - pii.redact
            - scraper.markdown
            - speech.transcribe
            - text.calories
            - text.classify
            - text.expenses
            - text.sentiment
            - text.summarize
            - text.todos
        charactersIn:
          type: integer
          description: The total number of characters that were detected by the cost calculation.
          format: int64
        charactersOut:
          type: integer
          description: The total number of characters that were sent out if used in the cost calculation.
          format: int64
        totalCharacters:
          type: integer
          description: The total number of characters that were detected.
          format: int64
        charactersPerPage:
          type: integer
          description: The number of characters which are characterized as one page for this operation.
          format: int64
        pages:
          type: integer
          description: The number of pages that were detected.
          format: int64
          example: 1
        pageCost:
          type: integer
          description: The cost per page of the operation.
          format: int64
          example: 3
        totalCost:
          type: integer
          description: The total cost of the operation.
          format: int64
          example: 3
      required:
        - operation
        - totalCost

    TextTodoRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text containing the todo item.
          example: "Pick up the car tomorrow evening"
        usersDate:
          type: string
          description: The user's current date in DD/MM/YYYY format.
          example: "05/05/2026"
        usersDay:
          type: string
          description: The user's current day of the week.
          example: "Tuesday"
        usersTime:
          type: string
          description: The user's current time.
          example: "4:13 PM"
      required:
        - text

    TextTodoItem:
      type: object
      properties:
        todo:
          type: string
          description: The extracted todo item.
          example: "Pick up the car"
        reminderDate:
          type: string
          description: The suggested reminder date in DD/MM/YYYY format.
          example: "06/05/2026"
        reminderTime:
          type: string
          description: The suggested reminder time in HH:MM format.
          example: "18:00"
      required:
        - todo
        - reminderDate
        - reminderTime

    TextTodoResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        todo:
          $ref: "#/components/schemas/TextTodoItem"
      required:
        - costCalculation
        - todo

    TextExpensesRequest:
      type: object
      properties:
        text:
          type: string
          description: The body of text containing expense data.
          example: "59.99 for bananas"
        classifications:
          type: array
          description: The list of categories to classify each expense item into.
          example:
            - "Food & Dining"
            - "Transport"
            - "Shopping"
            - "Utilities"
            - "Entertainment"
            - "Health"
            - "Education"
            - "Other"
          items:
            type: string
      required:
        - text

    TextExpenseItem:
      type: object
      properties:
        name:
          type: string
          description: The name of the expense item.
          example: "bananas"
        amount:
          type: string
          description: The monetary amount of the expense item.
          example: "59.99"
        category:
          type: string
          description: The category the expense item was classified into.
          example: "Food & Dining"
      required:
        - name
        - amount
        - category

    TextExpensesResponse:
      type: object
      properties:
        costCalculation:
          $ref: "#/components/schemas/TextCostCalculation"
        items:
          type: array
          description: The list of expense items extracted from the text.
          items:
            $ref: "#/components/schemas/TextExpenseItem"
      required:
        - costCalculation
        - items

    TextCostCalculation:
      description: The cost calculation for the endpoint invocation
      type: object
      properties:
        operation:
          type: string
          enum:
            - document.text
            - document.expense
            - document.identity
            - image.calories
            - image.list
            - language.detect
            - language.translate
            - pii.detect
            - pii.redact
            - scraper.markdown
            - speech.transcribe
            - text.calories
            - text.classify
            - text.expenses
            - text.sentiment
            - text.summarize
            - text.todos
        charactersIn:
          type: integer
          description: The total number of characters that were detected by the cost calculation.
          format: int64
          example: 100
        charactersOut:
          type: integer
          description: The total number of characters that were sent out if used in the cost calculation.
          format: int64
          example: 100
        totalCharacters:
          type: integer
          description: The total number of characters that were detected.
          format: int64
          example: 200
        charactersPerPage:
          type: integer
          description: The number of characters which are characterized as one page for this operation.
          format: int64
          example: 1000
        pages:
          type: integer
          description: The number of pages that were detected.
          format: int64
          example: 1
        pageCost:
          type: integer
          description: The cost per page of the operation.
